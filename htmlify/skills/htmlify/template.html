<!doctype html>
<!-- htmlify Swiss template (International Typographic Style). Copy this whole
     file, then replace the body content between <!--CONTENT START--> and
     <!--CONTENT END-->. Delete components you don't use — every element must
     earn its place. One self-contained file: no CDNs, no <script src>, no web
     fonts, and — Swiss discipline — no gradients, shadows, or rounded corners. -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>REPLACE — page title</title>
<style>
:root{
  --bg:#ffffff; --ink:#111111;
  --text:#1a1a1a;      /* body — never light grey on white */
  --text-dim:#555555;  /* secondary, still legible */
  --text-mute:#767676; /* captions, metadata */
  --line:#e3e3e3;      /* hairline rules */
  --rule:#111111;      /* strong structural rules */
  --accent:#28a745;    /* ONE accent — used only to carry meaning */
  /* type scale ~1.333: 13 / 17 / 23 / 30 / 40 / 64 */
  /* spacing scale: 4 8 16 24 32 48 64 — only these values */
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);
  font:17px/1.65 "Helvetica Neue",Helvetica,Inter,Arial,sans-serif;-webkit-font-smoothing:antialiased}
.wrap{max-width:1080px;margin:0 auto;padding:0 32px 96px}

/* 12-column grid — apply consistently, break only for emphasis */
.grid-12{display:grid;grid-template-columns:repeat(12,1fr);gap:32px;align-items:start}
.c4{grid-column:span 4} .c6{grid-column:span 6} .c8{grid-column:span 8} .c12{grid-column:span 12}
@media(max-width:720px){.grid-12{grid-template-columns:1fr;gap:24px}.c4,.c6,.c8,.c12{grid-column:auto}}

/* hero — flush-left headline in a column of air, closed by a thick rule */
header.hero{padding:80px 0 32px;border-bottom:3px solid var(--rule);margin-bottom:48px}
.eyebrow{font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin:0 0 24px}
header.hero h1{font-size:clamp(40px,7vw,64px);font-weight:700;line-height:1.04;letter-spacing:-.02em;margin:0;max-width:18ch}
header.hero .meta{color:var(--text-dim);font-size:17px;margin-top:24px;max-width:60ch}

/* hierarchy by size/weight/space, not decoration */
h2{font-size:30px;font-weight:700;letter-spacing:-.01em;line-height:1.15;margin:64px 0 16px}
h2 .num{color:var(--accent);font-weight:700;margin-right:16px;font-variant-numeric:tabular-nums}
h3{font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-mute);margin:32px 0 8px}
p{margin:16px 0;max-width:68ch}  /* ~65-75ch measure */
a{color:var(--accent);text-decoration:none;border-bottom:1px solid var(--accent)}
a:hover{background:var(--accent);color:#fff}
.dim{color:var(--text-dim)} .mute{color:var(--text-mute)}
hr{border:0;border-top:1px solid var(--line);margin:48px 0}

/* card — hairline border, sharp corners, no shadow */
.card{background:var(--bg);border:1px solid var(--line);padding:24px;height:100%}
.card h3{margin-top:0}

/* callout / aside — accent left rail, no fill flourish */
.note{border-left:3px solid var(--accent);padding:8px 0 8px 24px;margin:24px 0;color:var(--text-dim)}

code,pre{font-family:"SF Mono",ui-monospace,Menlo,Consolas,monospace;font-size:14px}
code{background:#f4f4f4;padding:1px 6px}
pre{background:#f4f4f4;border-left:3px solid var(--rule);padding:16px 24px;overflow:auto;line-height:1.55;color:var(--ink)}
pre .add{color:#1c7a34} pre .del{color:#c0392b} pre .ctx{color:var(--text-mute)}

/* table — hairline rules only, no zebra fills */
table{width:100%;border-collapse:collapse;margin:24px 0;font-size:15px}
th,td{text-align:left;padding:12px 16px 12px 0;border-bottom:1px solid var(--line);vertical-align:top}
th{font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink);
  border-bottom:2px solid var(--rule)}

/* badge — square, flat, tracked uppercase; accent only when it means something */
.badge{display:inline-block;font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  padding:2px 8px;border:1px solid var(--text-mute);color:var(--text-dim)}
.badge.on{border-color:var(--accent);color:var(--accent)}

.btn{display:inline-block;font:inherit;font-weight:700;cursor:pointer;padding:12px 24px;
  background:var(--accent);color:#fff;border:1px solid var(--accent)}
.btn.outline{background:transparent;color:var(--ink);border-color:var(--ink)}

footer{margin-top:96px;border-top:1px solid var(--line);padding-top:24px;color:var(--text-mute);font-size:13px}
</style>
</head>
<body>
<div class="wrap">
<!--CONTENT START — replace everything below; delete unused components-->

  <header class="hero">
    <p class="eyebrow">REPLACE — section / kind</p>
    <h1>REPLACE — page title</h1>
    <p class="meta">REPLACE — one-line standfirst or metadata</p>
  </header>

  <h2><span class="num">01</span>Section heading</h2>
  <p>Body copy. Let size, weight, and whitespace carry hierarchy — not boxes or
     colour. Use <a href="#">a link</a> or a <code>code span</code> inline. The
     accent appears rarely, so it does work when it does.</p>

  <div class="note">A callout / aside — accent left rail, no fill.</div>

  <div class="grid-12">
    <div class="card c4"><h3>Card label</h3><p>Card body.</p></div>
    <div class="card c4"><h3>Card label</h3><p>Card body.</p></div>
    <div class="card c4"><h3>Card label</h3><p>Card body.</p></div>
  </div>

  <h2><span class="num">02</span>Detail</h2>
  <pre><span class="add">+ added line</span>
<span class="del">- removed line</span>
<span class="ctx">  context line</span></pre>

  <table>
    <thead><tr><th>Column</th><th>Column</th><th>Status</th></tr></thead>
    <tbody>
      <tr><td>Row</td><td>Value</td><td><span class="badge on">active</span></td></tr>
      <tr><td>Row</td><td>Value</td><td><span class="badge">idle</span></td></tr>
    </tbody>
  </table>

  <footer>REPLACE — quiet metadata: generated from X, date, source.</footer>

<!--CONTENT END-->
</div>
</body>
</html>
